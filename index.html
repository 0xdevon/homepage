<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Homepage</title>
  <meta name="description" content="Personal homepage" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-shell is-loading" id="pageShell">
    <header class="topbar fade-item">
      <div class="topbar-actions">
        <button class="ghost-btn ghost-btn--lang" id="langToggle" type="button" aria-label="切换语言">EN</button>
        <button class="ghost-btn ghost-btn--theme" id="themeToggle" type="button" aria-label="切换主题">
          <span class="theme-icon theme-icon--sun" id="themeSun" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4.2"></circle>
              <path d="M12 1.8v2.4"></path>
              <path d="M12 19.8v2.4"></path>
              <path d="M4.79 4.79l1.7 1.7"></path>
              <path d="M17.51 17.51l1.7 1.7"></path>
              <path d="M1.8 12h2.4"></path>
              <path d="M19.8 12h2.4"></path>
              <path d="M4.79 19.21l1.7-1.7"></path>
              <path d="M17.51 6.49l1.7-1.7"></path>
            </svg>
          </span>
          <span class="theme-icon theme-icon--moon" id="themeMoon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.4 14.2A8.7 8.7 0 0 1 9.8 3.6 9.2 9.2 0 1 0 20.4 14.2Z"></path>
            </svg>
          </span>
        </button>
      </div>
    </header>

    <main class="hero" id="hero">
      <section class="content">
        <div class="avatar fade-item" id="avatar" aria-label="avatar"></div>

        <h1 class="fade-item" id="name">Your Name</h1>
        <p class="subtitle fade-item" id="bio">Your short bio here.</p>

        <div class="card fade-item">
          <div class="links" id="socialLinks"></div>
        </div>

        <div class="socials fade-item" id="quickActions"></div>
        <p class="copyright">Copyright © 2026 Devon Chan. All Rights Reserved.</p>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./main.js"></script>
</body>
</html>
