<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7fb" />
  <meta name="apple-mobile-web-app-title" content="Homepage" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <title>Homepage</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=16" />
</head>
<body>
  <main class="shell">
    <aside class="sidebar glass fade-in">
      <div class="profile-top">
        <div class="avatar" id="profileAvatar" aria-label="Avatar">DC</div>
        <div class="name-wrap">
          <h1 id="profileName">Devon Chan</h1>
          <p id="profileRole">Developer · Photographer</p>
        </div>
      </div>

      <div class="status">
        <span class="dot"></span>
        <span id="profileStatus">Currently building personal projects</span>
      </div>

      <div class="section-title">社交&媒体</div>
      <div class="social-grid" id="socialGrid"></div>

      <button class="theme-btn" id="themeToggle" type="button" aria-label="切换深色/浅色模式">
        <span class="theme-icon" id="themeIcon" aria-hidden="true">
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <path d="M269.696 205.76l-12.224-12.288a43.008 43.008 0 0 0-61.12 0 43.776 43.776 0 0 0 0 61.632l12.288 12.352a43.008 43.008 0 0 0 61.056 0 43.776 43.776 0 0 0 0-61.696zM145.088 470.848h-40a41.088 41.088 0 0 0 0 82.24h40a41.088 41.088 0 0 0 0-82.24zM512 64a40.704 40.704 0 0 0-40.704 40.704v37.76a40.704 40.704 0 0 0 81.408 0v-37.76A40.704 40.704 0 0 0 512 64z m315.648 129.472a43.008 43.008 0 0 0-61.12 0l-14.272 14.336a40.896 40.896 0 0 0 0 57.6c16 16.064 41.792 16.832 58.624 1.6l15.104-13.632a41.408 41.408 0 0 0 1.664-59.904z m-75.392 622.72l16.32 16.384a40.192 40.192 0 0 0 57.024 0 40.832 40.832 0 0 0 0-57.536l-16.256-16.448a40.192 40.192 0 0 0-57.088 0 40.896 40.896 0 0 0 0 57.6z m126.656-263.104h40a41.088 41.088 0 0 0 0-82.24h-40a41.088 41.088 0 0 0 0 82.24zM512 960a40.704 40.704 0 0 0 40.704-40.704v-37.76a40.704 40.704 0 0 0-81.408 0v37.76c0 22.464 18.24 40.704 40.704 40.704z m-315.648-129.536a43.008 43.008 0 0 0 61.12 0l14.272-14.336a40.896 40.896 0 0 0 0-57.536 42.432 42.432 0 0 0-58.56-1.664l-15.104 13.696a41.408 41.408 0 0 0-1.728 59.84zM512 265.344c-134.4 0-244.352 111.04-244.352 246.592 0 135.68 109.952 246.592 244.352 246.592S756.48 647.552 756.48 512c0-135.552-109.952-246.592-244.416-246.592" fill="#2c2c2c"></path>
          </svg>
        </span>
        <span id="themeText">浅色模式</span>
      </button>
    </aside>

    <section class="main">
      <header class="hero glass fade-in" style="animation-delay: 80ms;">
        <div class="hero-content">
          <div class="eyebrow" id="heroEyebrow">✦ Personal Homepage · RSS Dashboard</div>
          <h2 id="heroTitle">简约、清晰、带一点 iOS 风格的个人主页。</h2>
          <p id="heroDescription">
            左侧作为个人名片和社交跳转入口，右侧展示 RSS 信息流。PC 端保持分栏阅读，移动端自动变成单列卡片布局。
          </p>
        </div>
      </header>

      <section class="rss-panel glass fade-in" style="animation-delay: 140ms;">
        <div class="panel-head">
          <div>
            <h3 id="rssTitle">RSS News</h3>
            <p id="rssDescription">这里可以接入你的博客、技术资讯、摄影资讯或中文新闻源。</p>
          </div>
          <div class="feed-tabs" id="feedTabs" role="tablist" aria-label="RSS 分类"></div>
        </div>

        <div class="rss-list" id="rssList">
          <div class="empty-state">RSS 加载中...</div>
        </div>
      </section>

      <footer class="footer" id="footerText">Copyright © 2026 devonchan.com</footer>
    </section>
  </main>

  <script src="assets/js/app.js?v=16"></script>
</body>
</html>
